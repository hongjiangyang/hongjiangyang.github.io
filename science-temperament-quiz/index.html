<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>科学气质测试</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#">科学气质测试</a>
    <nav>
      <a href="#quiz">开始</a>
      <a href="#result">结果</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-media" aria-hidden="true"></div>
      <div class="hero-content">
        <p class="kicker">Science History Persona Quiz</p>
        <h1>科学气质测试</h1>
        <p class="hero-copy">
          你更像哪一种科学发现者？回答 24 个问题，生成你的科学气质雷达图。
        </p>
        <div class="concept-box">
          <p>科学发现不是一种能力，而是多种认识方式的组合。</p>
          <div class="dimension-chips" aria-label="六种接近未知的方式">
            <span>观察力：让现象变得可见</span>
            <span>数学化：让关系变得清楚</span>
            <span>实验精神：让因果变得可检验</span>
            <span>怀疑精神：让解释变得可靠</span>
            <span>跨界想象：让问题变得更大</span>
            <span>技术工具：让能力突破身体和直觉的限制</span>
          </div>
        </div>
        <a class="primary-action" href="#quiz">开始测试</a>
      </div>
    </section>

    <section id="quiz" class="quiz-shell">
      <div class="progress-panel">
        <p class="section-label">Quiz</p>
        <h2 id="questionCounter">第 1 / 24 题</h2>
        <div class="progress-track">
          <div id="progressBar"></div>
        </div>
      </div>

      <div class="question-panel">
        <h3 id="questionText"></h3>
        <div id="options" class="options"></div>
        <div class="quiz-actions">
          <button id="prevBtn" type="button" class="secondary">上一题</button>
          <button id="nextBtn" type="button" class="primary">下一题</button>
        </div>
      </div>
    </section>

    <section id="result" class="result-shell" hidden>
      <div class="result-heading">
        <p class="section-label">Result</p>
        <h2 id="personaTitle"></h2>
        <p class="tradition-note" id="personaTradition"></p>
        <p id="personaSummary"></p>
        <div class="typicality-box" aria-live="polite">
          <div class="typicality-head">
            <span>典型性分数</span>
            <strong><span id="typicalityScore">--</span>/100</strong>
          </div>
          <div class="typicality-meter" aria-hidden="true">
            <span id="typicalityBar"></span>
          </div>
          <p id="typicalityText"></p>
        </div>
      </div>

      <div class="result-layout">
        <div class="radar-panel">
          <canvas id="radarCanvas" width="560" height="560" aria-label="科学气质雷达图"></canvas>
        </div>
        <div class="interpretation-panel">
          <div class="score-list" id="scoreList"></div>
          <div class="persona-box">
            <h3 id="personaKeywords"></h3>
            <p id="personaAdvice"></p>
            <div class="question-box">
              <h4>适合提出的问题</h4>
              <ul id="personaQuestions"></ul>
            </div>
          </div>
          <div class="result-actions">
            <button id="restartBtn" type="button" class="secondary">重新测试</button>
            <button id="copyBtn" type="button" class="primary">复制结果</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <span>不是智商测试，而是你偏爱的发现方式。</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
